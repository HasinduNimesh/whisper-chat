services:
  - type: web
    name: whisper-signaling
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build --workspace=shared && npm run build --workspace=server
    startCommand: npm run start --workspace=server
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      # Comma-separated list of allowed browser Origins (your Vercel URL(s)).
      # Set this in the Render dashboard after your Vercel deploy is live —
      # e.g. https://whisper-chat.vercel.app,https://whisper-chat-git-main-you.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false
      # Free Metered.ca account -> Dashboard -> TURN Server -> Add Credential,
      # then "Show API Key" on it for METERED_API_KEY (a credential-scoped
      # key, not the account secretKey). METERED_DOMAIN is your subdomain
      # (yourapp.metered.live). Delivered to clients over the authenticated
      # WS session (never a public HTTP route) so calls work across strict
      # NATs. Leave unset to fall back to STUN-only.
      - key: METERED_API_KEY
        sync: false
      - key: METERED_DOMAIN
        sync: false
      # Optional Postgres connection string (e.g. from a free Neon.tech
      # project — use its "direct", non-pooled connection string, since this
      # is a long-lived process, not a serverless function). Enables message
      # history: cross-device sync of your own sent messages, and offline
      # delivery to room members who aren't currently connected. The server
      # only ever stores ciphertext + routing metadata (room id, sender/
      # recipient public keys, display names, timestamps) — never plaintext.
      # Leave unset to run exactly as before: fully in-memory, no history.
      - key: DATABASE_URL
        sync: false
