# Whisper — nginx reverse proxy + static host.
#
# Serves the built client (client/dist) and proxies the WebSocket signaling to
# the local Node `ws` server on 127.0.0.1:8787, terminating TLS at one origin.
# The client talks to wss://<this-host>/signaling automatically (same origin).
#
# Install:
#   sudo cp deploy/nginx/whisper.conf /etc/nginx/sites-available/whisper.conf
#   sudo ln -s /etc/nginx/sites-available/whisper.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Replace chat.example.com and the paths below to match your box.

# Map the Upgrade header so WebSocket connections proxy correctly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name chat.example.com;   # or "_" to match any host / bare IP

    # ACME HTTP-01 challenge (certbot), then force HTTPS for everything else.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name chat.example.com;

    # --- TLS ---
    # Domain (Let's Encrypt):
    ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;
    # IP/LAN only (self-signed) — comment the two lines above and use these:
    # ssl_certificate     /etc/nginx/ssl/whisper.crt;
    # ssl_certificate_key /etc/nginx/ssl/whisper.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # --- Security headers (defense-in-depth) ---
    # Strict CSP: everything is same-origin. The app makes no third-party
    # requests (fonts are self-hosted), so no external sources are whitelisted.
    # 'unsafe-inline' is needed only for style attributes React sets inline;
    # script-src stays 'self' (no inline scripts) — the key XSS mitigation.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data: blob:; media-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), interest-cohort=()" always;
    # HSTS: enable ONLY with a real CA-issued cert (a self-signed LAN cert can't
    # satisfy it and browsers ignore it over an untrusted connection anyway).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # --- Static client (output of `npm run build` → client/dist) ---
    root /srv/whisper/client/dist;
    index index.html;

    # Long-cache fingerprinted assets; everything else falls back to the SPA.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Embeddable chat widget — the ONE page allowed inside iframes on
    # arbitrary store sites (auth is tokens/visitor secrets, not cookies).
    # add_header at location level replaces inherited headers: restate the
    # full set minus X-Frame-Options, with frame-ancestors open.
    location = /widget.html {
        add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; frame-ancestors *; object-src 'none'; img-src 'self' data: blob:; media-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        try_files $uri =404;
    }

    # The embed loader stores add via <script src> (copy widget/dist/embed.js
    # into the web root next to client/dist output).
    location = /embed.js {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Org REST API (auth, conversations, widget endpoints) ---
    location ~ ^/(api|handles|healthz)(/|$) {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Signaling: proxy the WebSocket to the local ws server ---
    location /signaling {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep idle WebSocket connections open (1h) instead of nginx's 60s default.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
