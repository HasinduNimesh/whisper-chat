# Whisper — full self-hosted stack: Postgres + signaling server + web client.
#
#   docker compose up -d --build
#   → open http://localhost:8080
#
# Configuration (all optional; see .env.example for details):
#   POSTGRES_PASSWORD  database password  (default "whisper" — CHANGE for any
#                      deployment where Postgres could ever be reachable)
#   ALLOWED_ORIGINS    browser origins allowed to connect
#                      (default http://localhost:8080 — set to your public
#                      https:// origin in production)
#   WEB_PORT           host port for the web UI (default 8080)
#   METERED_API_KEY / METERED_DOMAIN   TURN credentials for reliable calls
#
# Postgres is NOT published to the host; it is only reachable on the internal
# compose network. The server stores ciphertext + routing metadata only.
#
# Prefer no message history at all? Use the DB-less variant:
#   docker compose -f docker-compose.no-db.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whisper
      POSTGRES_USER: whisper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whisper}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U whisper -d whisper']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgres://whisper:${POSTGRES_PASSWORD:-whisper}@postgres:5432/whisper
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      METERED_API_KEY: ${METERED_API_KEY:-}
      METERED_DOMAIN: ${METERED_DOMAIN:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
